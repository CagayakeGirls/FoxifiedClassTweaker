plugins {
	id "java-library"
}

base.archivesName = "$project.archives_name-$project.name"

repositories {
	mavenCentral()
}

dependencies {
	include("net.fabricmc:class-tweaker:$project.classtweaker_version")
}

jar {
	manifest {
		attributes([
				"FMLModType": "LIBRARY"
		])
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
			artifactId = "$project.archives_name-$project.name"
		}
	}
}